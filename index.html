<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport avec safe-area iOS (notch, Dynamic Island, home indicator) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / Mode standalone iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Couleur du thème (barre de statut sur iPhone / Android) -->
    <meta name="theme-color" content="#F5F5F7" />

    <!-- Manifest PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Icônes -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Polices Google — chargées en parallèle du JS (avant : @import dans
         globalCss, render-blocking car injecté tardivement par React).
         Familles/graisses inchangées (700/800 encore utilisées, élagage post-DS-2). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" />

    <!-- Titre de l'app -->
    <title>EPJ — Application interne</title>
    <meta name="description" content="Application interne EPJ Électricité Générale — gestion des commandes, chantiers, parc machines." />

    <!-- Empêche la traduction auto Safari sur les textes de l'app -->
    <meta name="google" content="notranslate" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
